name: Bot Emagrecer com Saúde

on:
  schedule:
    - cron: '0 18 * * 2,4,6'  # 15:00 Brasil (UTC 18:00) Ter, Qui, Sáb

  workflow_dispatch:
    inputs:
      test_mode:
        description: "Ativar modo teste? (true ou false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar Dependências
        run: pip install -r requirements.txt

      - name: Criar token.json a partir do Secret
        run: |
          echo '${{ secrets.BLOGGER_TOKEN_JSON }}' > token.json

      - name: Rodar Bot Emagrecer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
        run: python run_bot.py

      - name: Commitar arquivos de controle automaticamente
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com]"

          [ -f controle_agendamentos.txt ] && git add controle_agendamentos.txt
          [ -f controle_temas_usados.txt ] && git add controle_temas_usados.txt
          [ -f controle_imagens.txt ] && git add controle_imagens.txt

          if git diff --staged --quiet; then
            echo "Nenhuma alteração para commit."
          else
            git commit -m "Atualiza arquivos de controle automaticamente"
            git push
          fi
